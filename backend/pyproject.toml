# Tooling configuration for the ArogyaM PMS backend.
# Runtime dependencies are installed from requirements.txt (see Dockerfile);
# this file currently only configures linting/typing per the implementation plan.

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["app"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]
warn_unused_ignores = true
warn_redundant_casts = true
ignore_missing_imports = true
