# =============================================================================
# ArogyaM PMS — Log rotation and retention (LOG-T0.3, SAD §10.1 #9)
# =============================================================================
# Deploy:  copy to /etc/logrotate.d/arogyam on the host (or mount in the
#          container via compose volume).
# Retention policy:
#   Application logs (api, nginx): retain ≥ 1 year (365 days, 12 monthly
#   rotations of 31-day files).  Older files are compressed and purged.
#   Audit log is the ONLY file that may contain PII/PHI — it is kept ≥ 1 year
#   and must only be accessible by the arogyam service account (mode 0640).
#
# File permissions:
#   All log files: mode 0640, owned by arogyam:arogyam
#   Audit log:     mode 0640, owned by arogyam:arogyam (restricted read)
#   Nginx logs:    mode 0640, owned by arogyam:www-data (nginx writes, arogyam reads)
# =============================================================================

# ── Application (FastAPI / uvicorn) logs ──────────────────────────────────────
# Docker json-file driver writes to /var/lib/docker/containers/<id>/<id>-json.log.
# For host-mounted log volumes use the path below; adjust to match your compose
# volumes.arogyam_logs.bind.source value.
/var/log/arogyam/api/*.log {
    daily
    missingok
    rotate 365
    compress
    delaycompress
    notifempty
    copytruncate
    create 0640 arogyam arogyam
    dateext
    dateformat -%Y%m%d
    olddir /var/log/arogyam/api/archive
    postrotate
        # Signal uvicorn to re-open log handles if not using copytruncate
        # (copytruncate is used by default here for zero-downtime log rotation)
        true
    endscript
}

# ── Nginx access + error logs ─────────────────────────────────────────────────
/var/log/arogyam/nginx/access.log
/var/log/arogyam/nginx/error.log {
    daily
    missingok
    rotate 365
    compress
    delaycompress
    notifempty
    copytruncate
    create 0640 arogyam www-data
    dateext
    dateformat -%Y%m%d
    olddir /var/log/arogyam/nginx/archive
    sharedscripts
    postrotate
        # Send USR1 to nginx to re-open log files after rotation
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}

# ── Audit log ─────────────────────────────────────────────────────────────────
# The audit log lives in the database (audit_log table), not on disk.
# If a SIEM export or flat-file audit trail is added in future, configure it
# here with:
#   mode 0640 — no world-read; only service account + security admin group
#   rotate 12 / monthly — keep 12 monthly archives = 1 year minimum
#   compress / delaycompress — reduce disk; decompress on access
#
# /var/log/arogyam/audit/audit.log {
#     monthly
#     missingok
#     rotate 12
#     compress
#     delaycompress
#     notifempty
#     copytruncate
#     create 0640 arogyam secaudit
#     dateext
#     olddir /var/log/arogyam/audit/archive
# }
