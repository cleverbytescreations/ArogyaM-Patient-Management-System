# =============================================================================
# ArogyaM PMS — CI pipeline (DEV-TF.4 skeleton)
# -----------------------------------------------------------------------------
# Triggers: every PR and every push to main.
#
# Jobs:
#   lint        — ruff (style + import-sort) on backend
#   type-check  — mypy strict on backend
#   test        — pytest against an ephemeral PostgreSQL service; coverage report
#
# All jobs must pass for a PR to merge (branch protection rules).
# Security scans (pip-audit, Trivy, secret scan) are in DEV-TF.5.
# Image build / deploy steps are in deploy.yml (DEV-TF.4 deploy phase).
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend

# Cancel an in-progress run when a newer commit is pushed to the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # lint — ruff check + format check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: ruff check
        run: ruff check app/

      - name: ruff format check
        run: ruff format --check app/

  # ---------------------------------------------------------------------------
  # type-check — mypy (non-blocking for now; becomes blocking once stubs land)
  # ---------------------------------------------------------------------------
  type-check:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "mypy>=1.10" "types-passlib" "types-python-jose"

      - name: mypy
        # --ignore-missing-imports: third-party stubs not yet installed
        # This step is informational until full type coverage is achieved.
        run: mypy app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true   # promoted to hard-fail after Sprint 1 stubs

  # ---------------------------------------------------------------------------
  # test — pytest + ephemeral PostgreSQL (TST-T0.1)
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest + Postgres)
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: arogyam
          POSTGRES_USER: arogyam
          POSTGRES_PASSWORD: arogyam_ci_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arogyam -d arogyam"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Connection string for the main DB (used to CREATE the test DB)
      DATABASE_URL: postgresql+psycopg://arogyam:arogyam_ci_pw@localhost:5432/arogyam
      # Separate test DB so integration tests are isolated from any seeded data
      TEST_DATABASE_URL: postgresql+psycopg://arogyam:arogyam_ci_pw@localhost:5432/arogyam_test
      # Reference DDL for the DDL↔migration parity drift guard (test_ddl_parity.py).
      # Set explicitly so the test runs (and fails loudly) in CI instead of skipping
      # if Docs/ is ever moved.
      DDL_SQL_PATH: ${{ github.workspace }}/Docs/DDL_DATAMODEL.sql
      # JWT secret (non-sensitive dev placeholder for CI)
      JWT_SECRET_KEY: ci-only-not-a-real-secret-00000000000000000000000000000000
      JWT_ACCESS_TTL_MIN: "15"
      JWT_REFRESH_TTL_MIN: "1440"
      # Minimal S3/MinIO config (tests that need real storage are skipped in CI)
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: arogyam-documents
      S3_USE_SSL: "false"
      UPLOAD_MAX_MB: "10"
      LOG_LEVEL: WARNING
      ENV: ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -U arogyam -d arogyam; do
            echo "waiting for postgres..."; sleep 2
          done

      - name: Create test database
        run: |
          PGPASSWORD=arogyam_ci_pw psql -h localhost -U arogyam -d arogyam \
            -c "CREATE DATABASE arogyam_test;"

      - name: Run migrations (upgrade head) on test DB
        run: |
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://arogyam:arogyam_ci_pw@localhost:5432/arogyam_test

      - name: Run tests with coverage
        run: |
          pytest app/tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7
