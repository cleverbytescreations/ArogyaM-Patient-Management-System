# =============================================================================
# ArogyaM PMS — CI pipeline (DEV-TF.4 + DEV-TF.5 + TST-T0.2 + TST-T0.5)
# -----------------------------------------------------------------------------
# Triggers: every PR and every push to main.
#
# Jobs:
#   lint          — ruff (style + import-sort) on backend
#   type-check    — mypy strict on backend
#   frontend-ci   — type-check + lint + vitest on frontend
#   test          — pytest against an ephemeral PostgreSQL service; coverage
#                   gates on critical paths (TST-T0.5); log-privacy guard (TST-T0.2)
#   dep-scan      — pip-audit + npm audit for known-vulnerable deps (DEV-TF.5)
#   secret-scan   — gitleaks for accidentally committed secrets (DEV-TF.5)
#
# All jobs must pass for a PR to merge (branch protection rules).
# Image build / deploy steps are in deploy.yml (DEV-TF.4 deploy phase).
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend

# Cancel an in-progress run when a newer commit is pushed to the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # lint — ruff check + format check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: ruff check
        run: ruff check app/

      - name: ruff format check
        run: ruff format --check app/

  # ---------------------------------------------------------------------------
  # type-check — mypy (non-blocking for now; becomes blocking once stubs land)
  # ---------------------------------------------------------------------------
  type-check:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "mypy>=1.10" "types-passlib" "types-python-jose"

      - name: mypy
        # --ignore-missing-imports: third-party stubs not yet installed
        run: mypy app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true   # promoted to hard-fail after full type coverage

  # ---------------------------------------------------------------------------
  # frontend-ci — type-check + lint + vitest (runs in frontend/)
  # ---------------------------------------------------------------------------
  frontend-ci:
    name: Frontend CI (type-check + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  # ---------------------------------------------------------------------------
  # test — pytest + ephemeral PostgreSQL (TST-T0.1, TST-T0.2, TST-T0.5)
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest + Postgres)
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: arogyam
          POSTGRES_USER: arogyam
          POSTGRES_PASSWORD: arogyam_ci_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arogyam -d arogyam"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://arogyam:arogyam_ci_pw@localhost:5432/arogyam
      TEST_DATABASE_URL: postgresql+psycopg://arogyam:arogyam_ci_pw@localhost:5432/arogyam_test
      DDL_SQL_PATH: ${{ github.workspace }}/Docs/DDL_DATAMODEL.sql
      JWT_SECRET_KEY: ci-only-not-a-real-secret-00000000000000000000000000000000
      JWT_ACCESS_TTL_MIN: "15"
      JWT_REFRESH_TTL_MIN: "1440"
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: arogyam-documents
      S3_USE_SSL: "false"
      UPLOAD_MAX_MB: "10"
      LOG_LEVEL: WARNING
      ENV: ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -U arogyam -d arogyam; do
            echo "waiting for postgres..."; sleep 2
          done

      - name: Create test database
        run: |
          PGPASSWORD=arogyam_ci_pw psql -h localhost -U arogyam -d arogyam \
            -c "CREATE DATABASE arogyam_test;"

      - name: Run migrations (upgrade head) on test DB
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://arogyam:arogyam_ci_pw@localhost:5432/arogyam_test

      # TST-T0.5 — coverage gates on critical paths.
      # --cov-fail-under enforces an overall floor; the --cov-report lcov line
      # also emits a machine-readable report consumed by the coverage upload step.
      # Critical paths (op_number, auth, audit, RBAC, follow-ups) are exercised
      # by dedicated test modules — if those modules are deleted or untested the
      # overall floor will catch the regression.
      - name: Run tests with coverage (TST-T0.1 + TST-T0.2 log-privacy + TST-T0.5 gates)
        run: |
          pytest app/tests/ -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # dep-scan — dependency vulnerability scan (DEV-TF.5)
  # pip-audit for Python; npm audit for Node.
  # Fails the build on HIGH or CRITICAL findings.
  # ---------------------------------------------------------------------------
  dep-scan:
    name: Dependency scan (pip-audit + npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Python ──
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit
        working-directory: backend

      - name: pip-audit (fail on HIGH/CRITICAL)
        # --desc: human-readable descriptions; --output json for artifact upload.
        # pip-audit exits non-zero if any unfixed vulnerability is found above
        # the severity threshold set with --severity (default: all; we filter
        # MODERATE+ via the --ignore-vuln flag if needed after triage).
        run: |
          pip-audit -r requirements.txt \
            --desc \
            --output json \
            --output-format json > /tmp/pip-audit.json || true
          # Fail on HIGH/CRITICAL only (ignore LOW/MODERATE noise at this stage)
          python3 -c "
          import json, sys
          data = json.load(open('/tmp/pip-audit.json'))
          deps = data.get('dependencies', [])
          critical = [v for d in deps for v in d.get('vulns', [])
                      if v.get('severity','').upper() in ('HIGH','CRITICAL')]
          if critical:
              print(f'FAIL: {len(critical)} HIGH/CRITICAL vulnerabilities found:')
              for v in critical:
                  print(f'  {v[\"id\"]}: {v.get(\"description\",\"\")[:120]}')
              sys.exit(1)
          print(f'OK: no HIGH/CRITICAL vulnerabilities in Python deps')
          "
        working-directory: backend

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: /tmp/pip-audit.json
          retention-days: 7

      # ── Node / npm ──
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (fail on HIGH/CRITICAL)
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true   # promoted to hard-fail after first triage pass

  # ---------------------------------------------------------------------------
  # secret-scan — detect accidentally committed secrets (DEV-TF.5, SEC-T0.3)
  # Uses gitleaks for fast, low-false-positive secret detection.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for git-log-based scanning

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for org-level scans; not needed for
          # public repos or personal use. Set it in repo secrets if required.
          GITLEAKS_ENABLE_COMMENTS: "false"

  # ---------------------------------------------------------------------------
  # image-scan — Trivy scan on the built API image (DEV-TF.5)
  # Runs only on pushes to main (not PRs) to keep PR feedback fast.
  # ---------------------------------------------------------------------------
  image-scan:
    name: Container image scan (Trivy)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image (dev stage — same base as prod)
        run: docker build -t arogyam-api:ci-scan --target dev .
        working-directory: backend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "arogyam-api:ci-scan"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
