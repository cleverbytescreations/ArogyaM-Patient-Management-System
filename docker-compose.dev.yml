# =============================================================================
# ArogyaM Patient Management System — DEVELOPMENT Docker Compose
# -----------------------------------------------------------------------------
# Purpose : Lightweight, low-resource stack for a developer laptop.
# Profile : Hot-reload API + Vite dev server, plain HTTP, seedable Postgres,
#           local MinIO + Redis (rate-limiter / token denylist, always-on).
#
# Architecture (SAD §5/§18): React SPA -> Nginx (dev proxy, HTTP) -> FastAPI
#           -> PostgreSQL + MinIO + Redis.
#
# Usage:
#   cp .env.dev.example .env.dev
#   docker compose -f docker-compose.dev.yml --env-file .env.dev up --build
#
# Recommended developer hardware (see Docs/DOCKER_DEPLOYMENT_GUIDE.md §2):
#   Minimum     : 2 vCPU / 4 GB RAM / 10 GB free disk
#   Recommended : 4 vCPU / 8 GB RAM / 20 GB free disk
#
# NOTE: This file is DEVELOPMENT ONLY. It is deliberately permissive
#       (default creds in .env.dev, exposed ports, no TLS). Never use it
#       to host real patient data. Production lives in docker-compose.prod.yml.
# =============================================================================

name: arogyam-dev

# -----------------------------------------------------------------------------
# Shared logging defaults — stdout/stderr captured by Docker's json-file driver
# with rotation so dev logs never fill the disk. Application code is responsible
# for PII/PHI redaction (SAD §10.1); Docker only transports stdout.
# -----------------------------------------------------------------------------
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — primary relational store (SAD §4). Extensions required by
  # Docs/DDL_DATAMODEL.sql (uuid-ossp, pgcrypto, pg_trgm, citext) ship with the
  # official image's contrib package.
  # ---------------------------------------------------------------------------
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arogyam}
      POSTGRES_USER: ${POSTGRES_USER:-arogyam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arogyam_dev_pw}
      # Keep timezone UTC; app stores ISO-8601 timestamps (SAD §9.1).
      TZ: ${TZ:-UTC}
    ports:
      # Exposed on localhost for dev tooling (psql, DBeaver). Not exposed in prod.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arogyam} -d ${POSTGRES_DB:-arogyam}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging
    networks: [arogyam]

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for uploaded documents (SAD §4/§7.9).
  # Binaries live here; only metadata lives in Postgres.
  # ---------------------------------------------------------------------------
  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_pw}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"     # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web console (dev convenience)
    volumes:
      - minio_data_dev:/data
    healthcheck:
      # NOTE: some MinIO images do not bundle curl. The authoritative readiness
      # gate for the API is the `createbuckets` job below (which loops until
      # MinIO answers). If this check reports "unhealthy" on your pinned image,
      # pin a release that includes curl or rely on createbuckets.
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    networks: [arogyam]

  # ---------------------------------------------------------------------------
  # createbuckets — one-shot init: waits for MinIO, then creates the documents
  # bucket and keeps it PRIVATE (documents are never publicly served — UC-30).
  # Acts as the readiness gate the API depends on.
  # ---------------------------------------------------------------------------
  createbuckets:
    image: ${MC_IMAGE:-minio/mc:latest}
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_pw}
      MINIO_BUCKET: ${MINIO_BUCKET:-arogyam-documents}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      mc anonymous set none local/$$MINIO_BUCKET;
      echo 'bucket ready (private):' $$MINIO_BUCKET;
      "
    networks: [arogyam]

  # ---------------------------------------------------------------------------
  # Redis — cache / rate-limiter / token denylist (SAD §4, MVP-light).
  # Always-on in dev; mirrors prod behaviour so the rate-limiter and JWT
  # denylist are exercised locally. Ephemeral (no persistence, no password).
  # ---------------------------------------------------------------------------
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    # Ephemeral in dev (no persistence). maxmemory caps the footprint and
    # `noeviction` fails writes rather than silently dropping denylist/rate-limit
    # keys (security-relevant — see prod note). Working set is tiny (kBs), so the
    # cap is never hit in practice.
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "${REDIS_MAXMEMORY:-128mb}", "--maxmemory-policy", "noeviction"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-0.25}"
          memory: ${REDIS_MEM_LIMIT:-192m}
    logging: *default-logging
    networks: [arogyam]

  # ---------------------------------------------------------------------------
  # api — FastAPI backend with hot reload. Source is bind-mounted so edits
  # reload instantly. depends_on uses CONDITIONS (not just order): DB must be
  # healthy and the bucket must exist before the API starts (SAD §18, Plan §13).
  #
  # NOTE: ./backend and its Dockerfile are added in the application-code step.
  #       Until then, comment out this service or point `build` at a stub.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      target: ${API_BUILD_TARGET:-dev}
    restart: unless-stopped
    # --proxy-headers lets uvicorn populate request.client from the proxy's
    # X-Forwarded-* so audit/rate-limit see the real client (the API is only
    # reachable via the reverse proxy, so trusting all upstreams is safe here).
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--proxy-headers", "--forwarded-allow-ips", "*"]
    env_file:
      - .env.dev
    environment:
      ENV: development
      # App-level config (mirrors core/config.py in the Implementation Plan §4.1)
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://arogyam:arogyam_dev_pw@db:5432/arogyam}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_pw}
      S3_BUCKET: ${MINIO_BUCKET:-arogyam-documents}
      S3_USE_SSL: "false"
      REDIS_URL: ${REDIS_URL:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:8080}
      UPLOAD_MAX_MB: ${UPLOAD_MAX_MB:-10}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      SQL_ECHO: "false"   # never echo SQL — would leak PHI into logs (SAD §10.1)
      BACKUP_TRIGGER_FILE: /backups/.trigger
    volumes:
      - ./backend:/app          # hot reload
      - /app/.venv              # keep container venv (do not shadow with host)
      - ./nginx:/app/nginx:ro   # nginx configs accessible for proxy-config tests (LOG-T0.2)
      - backup_data_dev:/backups  # shared with backup service for trigger-file protocol
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      # Uses Python (always present in the API image) so we don't depend on curl.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks: [arogyam]

  # ---------------------------------------------------------------------------
  # backup — runs pg_backup.sh + docs_backup.sh immediately on startup so
  # backup_log is never empty in dev, then runs daily at midnight (IST).
  # DATABASE_URL uses the plain postgresql:// scheme (no +psycopg driver prefix)
  # because pg_dump/psql do not understand SQLAlchemy driver qualifiers.
  # ---------------------------------------------------------------------------
  backup:
    build:
      context: ./ops/backup
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-arogyam}:${POSTGRES_PASSWORD:-arogyam_dev_pw}@db:5432/${POSTGRES_DB:-arogyam}"
      BACKUP_DEST: /backups
      DB_NAME: ${POSTGRES_DB:-arogyam}
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-arogyam}
      PGPASSWORD: ${POSTGRES_PASSWORD:-arogyam_dev_pw}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_pw}
      MINIO_BUCKET: ${MINIO_BUCKET:-arogyam-documents}
      # SMTP alerting — leave blank in dev to skip email (notify.sh no-ops when SMTP_HOST unset)
      SMTP_HOST: ""
      BACKUP_TRIGGER_FILE: /backups/.trigger
      TZ: Asia/Kolkata
    volumes:
      - backup_data_dev:/backups
    depends_on:
      db:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    logging: *default-logging
    networks: [arogyam]

  # ---------------------------------------------------------------------------
  # frontend — Vite dev server (React + TS) with HMR. Source bind-mounted.
  # NOTE: ./frontend and its Dockerfile are added in the application-code step.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      target: ${FRONTEND_BUILD_TARGET:-dev}
    restart: unless-stopped
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      # SPA talks to the API through the dev proxy (same origin -> no CORS pain).
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    volumes:
      - ./frontend:/app
      - /app/node_modules       # keep container node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    healthcheck:
      # Vite is served by the Node process, so use Node's built-in fetch instead
      # of relying on curl/wget being present in the image.
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging
    networks: [arogyam]

  # ---------------------------------------------------------------------------
  # proxy — Nginx dev reverse proxy (HTTP only, no TLS). Single origin for the
  # browser: / -> Vite, /api/ -> FastAPI. Mirrors the prod routing so dev and
  # prod behave the same. Open http://localhost:8080
  # ---------------------------------------------------------------------------
  proxy:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    restart: unless-stopped
    ports:
      - "${PROXY_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 (not localhost): busybox wget resolves localhost to ::1,
      # but nginx.dev.conf listens on IPv4 only -> would always report unhealthy.
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks: [arogyam]

# -----------------------------------------------------------------------------
# Named volumes — persistent dev data. Wipe with: docker compose ... down -v
# -----------------------------------------------------------------------------
volumes:
  pg_data_dev:
  minio_data_dev:
  backup_data_dev:

networks:
  arogyam:
    driver: bridge
