# =============================================================================
# ArogyaM PMS — Frontend production Nginx server block (DEV-TF.2)
# Mounted inside the frontend prod container as /etc/nginx/conf.d/default.conf.
#
# Responsibilities:
#   * Serve Vite-built static assets from /usr/share/nginx/html
#   * SPA history-API fallback (all non-asset routes -> index.html)
#   * Gzip compression for text assets
#   * Long-lived cache for hashed assets; short cache for index.html
#   * Security: no version disclosure, no directory listing
#   * No TLS here — TLS is terminated at the edge proxy (nginx/nginx.prod.conf)
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Gzip text assets (Vite already produces .gz files; prefer pre-compressed).
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1024;

    # ── Cache policy ──────────────────────────────────────────────────────────
    # Hashed assets (JS/CSS chunks from Vite's build) — immutable 1-year cache.
    location ~* \.(js|css|woff2|woff|ttf|svg|ico|png|jpg|jpeg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html — no-cache so deploys propagate immediately.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Proxy health probe ────────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── SPA fallback: all unmatched paths serve index.html ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
