<svg width="760" height="620" viewBox="0 0 760 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of ArogyaM digital patient records, secure storage and care continuity">
  <defs>
    <linearGradient id="am-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fbf6f1"/>
    </linearGradient>
    <linearGradient id="am-coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6a4d"/>
      <stop offset="1" stop-color="#f5421f"/>
    </linearGradient>
    <linearGradient id="am-navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2c4a8f"/>
      <stop offset="1" stop-color="#1f3566"/>
    </linearGradient>
    <filter id="am-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#1f1a16" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Kyndryl-style coral sawtooth motif -->
  <g stroke="url(#am-coral)" stroke-width="2.5" fill="none" opacity="0.9">
    <path d="M30 70 L70 30 L70 70 L110 30 L110 70 L150 30 L150 70 L190 30 L190 70 L230 30 L230 70 L270 30 L270 70 L310 30 L310 70 L350 30"/>
  </g>

  <!-- Primary record card -->
  <g filter="url(#am-shadow)">
    <rect x="70" y="120" width="360" height="280" rx="10" fill="url(#am-card)" stroke="#efe4da"/>
    <rect x="70" y="120" width="360" height="56" rx="10" fill="#1c1917"/>
    <rect x="70" y="166" width="360" height="10" fill="#1c1917"/>
    <circle cx="104" cy="148" r="14" fill="url(#am-coral)"/>
    <rect x="130" y="141" width="120" height="9" rx="4.5" fill="#ffffff" opacity="0.95"/>
    <rect x="130" y="156" width="80" height="7" rx="3.5" fill="#ffffff" opacity="0.5"/>

    <!-- Heartbeat / pulse line -->
    <path d="M96 270 H150 L168 232 L196 312 L222 256 L240 270 H404" stroke="url(#am-coral)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- record rows -->
    <rect x="96" y="330" width="240" height="9" rx="4.5" fill="#e7ded4"/>
    <rect x="96" y="352" width="170" height="9" rx="4.5" fill="#efe7dd"/>
    <rect x="356" y="330" width="48" height="31" rx="6" fill="#fbe7e0"/>
  </g>

  <!-- Lotus mark badge -->
  <g filter="url(#am-shadow)">
    <circle cx="540" cy="210" r="86" fill="url(#am-navy)"/>
    <g transform="translate(540 214)" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
      <path d="M0 26 C0 -2 0 -22 0 -34 C12 -20 20 -2 0 26 Z" fill="#ffffff" stroke="none" opacity="0.9"/>
      <path d="M0 26 C-18 6 -30 -8 -34 -22 C-14 -18 2 -4 0 26 Z" fill="#ffd9cd" stroke="none" opacity="0.85"/>
      <path d="M0 26 C18 6 30 -8 34 -22 C14 -18 -2 -4 0 26 Z" fill="#ffd9cd" stroke="none" opacity="0.85"/>
      <path d="M0 26 C-32 14 -52 2 -60 -10 C-34 -10 -10 0 0 26 Z" fill="#ffffff" stroke="none" opacity="0.55"/>
      <path d="M0 26 C32 14 52 2 60 -10 C34 -10 10 0 0 26 Z" fill="#ffffff" stroke="none" opacity="0.55"/>
    </g>
  </g>

  <!-- Secure / shield document card -->
  <g filter="url(#am-shadow)">
    <rect x="360" y="350" width="300" height="210" rx="10" fill="url(#am-card)" stroke="#efe4da"/>
    <g transform="translate(420 408)">
      <path d="M30 0 L60 12 V40 C60 64 46 84 30 92 C14 84 0 64 0 40 V12 Z" fill="#fbe7e0"/>
      <path d="M30 8 L52 17 V40 C52 58 42 74 30 81 C18 74 8 58 8 40 V17 Z" fill="url(#am-coral)"/>
      <path d="M20 44 L27 52 L42 33" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <rect x="510" y="396" width="116" height="10" rx="5" fill="#1c1917"/>
    <rect x="510" y="416" width="96" height="8" rx="4" fill="#e7ded4"/>
    <rect x="510" y="436" width="116" height="8" rx="4" fill="#efe7dd"/>
    <rect x="510" y="456" width="70" height="8" rx="4" fill="#efe7dd"/>
    <rect x="510" y="492" width="116" height="30" rx="6" fill="url(#am-coral)"/>
  </g>

  <!-- small accent dots -->
  <g fill="#f5421f" opacity="0.85">
    <circle cx="690" cy="150" r="6"/>
    <circle cx="666" cy="150" r="6" opacity="0.5"/>
    <circle cx="642" cy="150" r="6" opacity="0.25"/>
  </g>
</svg>
