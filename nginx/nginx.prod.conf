# =============================================================================
# ArogyaM PMS — Nginx PRODUCTION edge proxy (TLS termination)
# -----------------------------------------------------------------------------
# This file is mounted as an envsubst TEMPLATE:
#   ./nginx/nginx.prod.conf -> /etc/nginx/templates/default.conf.template
# The official Nginx entrypoint substitutes ${DOMAIN} at container start and
# writes the result to /etc/nginx/conf.d/default.conf. Nginx runtime variables
# ($host, $uri, ...) are written WITHOUT braces so envsubst leaves them intact.
#
# Responsibilities:
#   * HTTP(80) -> HTTPS(443) redirect (+ ACME http-01 challenge passthrough)
#   * TLS 1.2/1.3 termination (Let's Encrypt certs)
#   * Security headers (HSTS, frame-deny, nosniff, referrer, CSP)
#   * Route "/" -> frontend SPA, "/api/" -> FastAPI
#   * Access logs WITHOUT query strings (SAD §10.1 control #7 — no PII/PHI)
# =============================================================================

# PII/PHI-safe access log: logs the normalized path ($uri) only, never $args /
# the raw $request line, so patient OP numbers, mobiles and search terms in
# query strings are never written to proxy logs.
log_format noquery '$remote_addr - $remote_user [$time_local] '
                   '"$request_method $uri $server_protocol" '
                   '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

upstream api_backend {
    server api:8000;
}
upstream frontend_app {
    server frontend:80;
}

# --- Port 80: ACME challenge + redirect everything else to HTTPS -------------
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    # Let's Encrypt http-01 challenge files (served from the shared webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Local healthcheck (kept on HTTP so the container probe needs no certs).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Port 443: TLS, security headers, routing --------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${DOMAIN};

    access_log /var/log/nginx/access.log noquery;

    # --- TLS (Let's Encrypt) -------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # Optional OCSP stapling (uncomment once a resolver is available):
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # --- Security headers (SAD §10) ------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Tighten CSP to match the SPA's real asset/API origins before go-live.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
    server_tokens off;

    # Allow 10 MB document uploads + multipart overhead (SAD §2.6 A5).
    client_max_body_size 12m;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # --- Backend API ---------------------------------------------------------
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_request_buffering off;   # stream large uploads instead of buffering
    }

    # --- Frontend SPA (history-fallback handled by the frontend image) -------
    location / {
        proxy_pass         http://frontend_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}