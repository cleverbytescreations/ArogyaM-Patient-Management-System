# =============================================================================
# ArogyaM PMS — Nginx DEVELOPMENT reverse proxy (HTTP only)
# -----------------------------------------------------------------------------
# Single browser origin: http://localhost:8080
#   /            -> Vite dev server (React SPA, with HMR websocket)
#   /api/        -> FastAPI backend
# Mirrors prod routing so behaviour is consistent. No TLS in dev.
# =============================================================================

# Access-log format that drops the query string (logs the path only) — keeps
# patient identifiers / search terms out of proxy logs even in dev (SAD §10.1).
log_format noquery '$remote_addr - $remote_user [$time_local] '
                   '"$request_method $uri $server_protocol" '
                   '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

server {
    listen 80;
    server_name localhost;

    # Docker's embedded DNS. Use variables in proxy_pass so Nginx re-resolves
    # service names after hot-reload/recreate cycles instead of keeping a stale
    # container IP and returning 502.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:8000;
    set $frontend_upstream http://frontend:5173;

    access_log /var/log/nginx/access.log noquery;
    client_max_body_size 12m;   # allow 10 MB uploads + multipart overhead

    # ── Security headers (SEC-T0.2) ───────────────────────────────────────────
    # Applied at the proxy level so ALL responses (API + SPA) carry them.
    # The FastAPI SecurityHeadersMiddleware echoes these on the API path for
    # defense-in-depth; the proxy is the authoritative outer boundary.
    add_header X-Content-Type-Options    "nosniff"                        always;
    add_header X-Frame-Options           "DENY"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    # NOTE: Debug/dev proxy is HTTP-only — no HSTS here. Prod nginx adds HSTS.

    # Proxy health endpoint for the container healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # --- Backend API ---------------------------------------------------------
    location /api/ {
        proxy_pass         $api_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # --- Frontend (Vite dev server + HMR websocket) --------------------------
    location / {
        proxy_pass         $frontend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Required for Vite Hot Module Replacement over websockets:
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
